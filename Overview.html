<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overview Navigation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            width:100%;
            height:100%;
            position:absolute;
        }
        #overview-sidebar {
            width: 250px;
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            position: fixed;
            height: 100%;
            overflow-y: auto;
        }
        #overview-sidebar ul {
            list-style-type: none;
            padding-left: 20px;
        }
        #overview-sidebar li {
            margin: 10px 0;
        }
        #overview-sidebar a {
            color: white;
            text-decoration: none;
            font-size: 16px;
            display: block;
        }
        #overview-sidebar a:hover {
            background-color: #34495e;
            padding-left: 10px;
        }
        #overview-main-content {
            width:78%;
            height:100%;
            margin-left: 270px;
            padding: 20px;
        }
        .overview-folder {
            font-weight: bold;
            cursor: pointer;
        }
        .overview-file {
            padding-left: 20px;
        }
    </style>
</head>
<body>

    <div id="overview-sidebar">
        <h2>Overview Navigation</h2>
        <ul id="overview-file-tree">
            <!-- Example navigation tree structure -->
            
        </ul>
    </div>

    <div id="overview-main-content">
        <h1>Welcome to the Overview</h1>
        <p>Select a file from the navigation panel to view its details.</p>
    </div>

  <script>
    // Recursively fetch files from the server's directory listing.
    // Note: Requires running on a local web server (e.g., Live Server, Python http.server, etc.)
    async function fetchOverviewFiles(dirPath, prefix) {
      let files =[];
      try {
        const response = await fetch(dirPath);
        if (!response.ok) return files;
        
        const text = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, 'text/html');
        const links = doc.querySelectorAll('a');

        for (let link of links) {
          let href = link.getAttribute('href');
          
          // Skip generic navigational links
          if (!href || href === '../' || href === '/' || href.startsWith('?') || href.includes('..')) {
            continue;
          }

          // Extract the actual item name
          let isDir = href.endsWith('/');
          let name = href.split('/').filter(Boolean).pop();

          if (!name) continue;

          // If it's a directory, recursively fetch its contents
          if (isDir) {
            let subFiles = await fetchOverviewFiles(dirPath + name + '/', prefix + name + '/');
            files = files.concat(subFiles);
          } else if (name.endsWith('.html')) {
            // Include HTML files with the exact "./[ADDRESS]" prefix format
            files.push(prefix + name);
          }
        }
      } catch (err) {
        console.warn("Could not fetch directory listing for " + dirPath + ". Make sure you are running this on a web server with directory listings enabled.", err);
      }
      return files;
    }

    function removeDuplicates(arr) {
      return [...new Set(arr)];
    }
    
    var menu;
    
    window.addEventListener('load', async function () {
      menu = document.getElementById("overview-file-tree");
      
      // Look up files dynamically instead of using a hardcoded array
      let overviews = await fetchOverviewFiles('overview/', './');
      
      overviews = removeDuplicates(overviews);
      overviews.sort();

      function createList(arr) {
        var location = null;
        arr.forEach((f) => {
          var locstr = "";
          if(location) {  
            locstr = location.id;
          }
          var fEle = null;
          if(locstr != "") {
            fEle = document.getElementById(locstr + "-" + f.replaceAll(" ", "-"));    
          } else {
            fEle = document.getElementById("overview-" + f.replaceAll(" ", "-"));    
          }
          if(!fEle) {
            var newli = document.createElement("li");
            newli.classList.add("overview-folder");
            newli.innerHTML = f;
            if(locstr != "") {
              newli.id = locstr + "-" + f.replaceAll(" ", "-");
            } else {
              newli.id = "overview-" + f.replaceAll(" ", "-");          
            }
            var newul = document.createElement("ul");
            newli.appendChild(newul);
            if(location) {
              location.children[0].appendChild(newli);
            } else {
              menu.appendChild(newli);
            }
            location = newli;
          } else {
            location = fEle;
          }
        });
      }

      var arboarr =[];
      overviews.forEach(goThroughOverviews);

      function goThroughOverviews(overview) {
        var href = overview.replace("./", "./Killtime/overview/");
        var arrtxt = overview.replace("./", "").substring(0, overview.replace("./", "").lastIndexOf("/")).replaceAll("%20", " ");
        if(arrtxt.length > 1){
          arboarr.push(arrtxt);
        }
      }

      var dup = removeDuplicates(arboarr).sort();
      dup.forEach((folder) => {
        var testarr = folder.split("/");
        createList(testarr);
      });

      overviews.forEach((f) => {
        var filename = f.substring(f.lastIndexOf("/"));
        var id = f.replace(filename, "").replace("./", "overview-").replaceAll("/", "-").replaceAll("%20", "-").replace(".", "overview-");
        var idEle = document.getElementById(id);
        if(!idEle) {
        } else {
          var newli = document.createElement("li");
          newli.classList.add("overview-file");
          var newp = document.createElement("p");
          newp.setAttribute("href", f.replace("./", "./overview/"));
          newp.onclick = function() {
            getOverview(f);
          };
          newp.innerHTML = filename.substring(1, filename.length - 5).replaceAll("%20", " ");
          newp.style.color = "#007bff";
          newp.style.cursor = "pointer"; // Makes it obvious that you can click items
          newli.appendChild(newp);
          idEle.children[0].appendChild(newli);
        }
      });
    })
  </script>

  		var folders=document.getElementsByClass("overview-folder");
  		folders.forEach((f) => {
  			
  		});
  	}
  </script>
  
  <script>
      function getOverview(overview) {
          var client = new XMLHttpRequest();
          client.open('GET', "overview/"+overview);
          client.onreadystatechange = function() {
            document.getElementById("overview-main-content").innerHTML=client.responseText;
            document.getElementById("overview-main-content").scrollIntoView();
          }
          client.send();
      }
  </script>

</body>
</html>
